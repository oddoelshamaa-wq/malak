<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Egypt Stay 3D | فنادق مصر</title>
    <!-- خط Cairo من جوجل -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- الهيدر -->
    <nav>
        <div class="logo">مصر<span>Stay</span></div>
        <div class="tag">بوابتك لإقامة ملكية 🇪🇬</div>
    </nav>

    <!-- الجزء الرئيسي (Hero) -->
    <section class="hero">
        <div class="hero-content">
            <h1>اكتشف جمال مصر</h1>
            <p>حجز أفخم الفنادق في القاهرة، شرم الشيخ، والجونة بتجربة فريدة</p>
            
            <div class="search-container">
                <select id="citySelect">
                    <option value="all">كل المدن المصرية</option>
                    <option value="cairo">القاهرة</option>
                    <option value="sharm">شرم الشيخ</option>
                    <option value="gouna">الجونة / الغردقة</option>
                    <option value="luxor">الأقصر وأسوان</option>
                </select>
                <button onclick="filterHotels()">ابحث الآن</button>
            </div>
        </div>
    </section>

    <!-- منطقة النتائج -->
    <h2 class="section-title">أفضل العروض الحالية</h2>
    <div class="hotels-grid" id="hotelsGrid">
        <!-- الفنادق تظهر هنا من خلال الجافا سكريبت -->
    </div>

    <footer>
        <p>جميع الحقوق محفوظة لشركة سياحة مصر 2024 ©</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
